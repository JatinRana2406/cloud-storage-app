<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudStore — Sign In</title>
  <meta name="description" content="CloudStore: A simple and secure local cloud storage system. Sign in or create an account to manage your files." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- Animated Background Blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="auth-container">

    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 15a4 4 0 004 4h9a5 5 0 10-0.1-9.999 5 5 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
        </svg>
      </div>
      <span class="brand-name">CloudStore</span>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="auth-card">

      <!-- Tab Switcher -->
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-signin" role="tab" aria-selected="true" onclick="switchTab('signin')">Sign In</button>
        <button class="tab" id="tab-signup" role="tab" aria-selected="false" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Toast / Message Banner -->
      <div class="toast hidden" id="toast" role="alert"></div>

      <!-- ── Sign In Form ── -->
      <form id="signin-form" class="auth-form" novalidate>
        <h1 class="form-title">Welcome back</h1>
        <p class="form-subtitle">Sign in to access your files</p>

        <div class="form-group">
          <label for="signin-email">Email address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="signin-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="signin-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="signin-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('signin-password', this)" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="signin-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <!-- ── Sign Up Form ── -->
      <form id="signup-form" class="auth-form hidden" novalidate>
        <h1 class="form-title">Create account</h1>
        <p class="form-subtitle">Start storing your files for free</p>

        <div class="form-group">
          <label for="signup-name">Full name</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="signup-name" name="name" placeholder="Jane Doe" autocomplete="name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="signup-email">Email address</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="signup-password">Password <span class="hint">(min. 6 characters)</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="signup-password" name="password" placeholder="••••••••" autocomplete="new-password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('signup-password', this)" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

    </div><!-- /.auth-card -->

    <p class="footer-note">College Mini Project · Cloud Storage System</p>

  </div><!-- /.auth-container -->

  <script src="js/auth.js"></script>
</body>
</html>
